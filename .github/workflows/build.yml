name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests

      - name: Build EXE
        run: |
          pyinstaller --onefile --name "GLM_Coding_Plan" --console grab_glm_coding_plan.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GLM_Coding_Plan_exe
          path: dist/GLM_Coding_Plan.exe
